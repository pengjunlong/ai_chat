name: Sync Secrets to Another Repo

# 仅支持手动触发，在 GitHub 网站 Actions 页面点击 "Run workflow"
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库（格式：owner/repo，如 pengjunlong/my-app）'
        required: true
        type: string
      secrets_to_sync:
        description: '要同步的 Secret 名称（逗号分隔，留空则同步全部签名 Secret）'
        required: false
        default: 'KEYSTORE_BASE64,KEYSTORE_PASSWORD,KEY_ALIAS,KEY_PASSWORD'
        type: string

jobs:
  sync:
    name: Sync Secrets → ${{ inputs.target_repo }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate target repo format
        run: |
          if [[ ! "${{ inputs.target_repo }}" =~ ^[^/]+/[^/]+$ ]]; then
            echo "❌ 目标仓库格式错误，应为 owner/repo"
            exit 1
          fi
          echo "✅ 目标仓库：${{ inputs.target_repo }}"

      - name: Sync secrets via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ inputs.target_repo }}"
          SECRETS="${{ inputs.secrets_to_sync }}"

          echo "📦 开始同步 Secrets 到 $TARGET ..."
          IFS=',' read -ra SECRET_NAMES <<< "$SECRETS"

          SUCCESS=0
          FAILED=0

          for NAME in "${SECRET_NAMES[@]}"; do
            NAME=$(echo "$NAME" | xargs)   # 去除空格
            [ -z "$NAME" ] && continue

            case "$NAME" in
              KEYSTORE_BASE64)    VALUE="${{ secrets.KEYSTORE_BASE64 }}" ;;
              KEYSTORE_PASSWORD)  VALUE="${{ secrets.KEYSTORE_PASSWORD }}" ;;
              KEY_ALIAS)          VALUE="${{ secrets.KEY_ALIAS }}" ;;
              KEY_PASSWORD)       VALUE="${{ secrets.KEY_PASSWORD }}" ;;
              *)
                echo "⚠️  未知 Secret：$NAME，跳过"
                continue
                ;;
            esac

            if gh secret set "$NAME" --body "$VALUE" --repo "$TARGET"; then
              echo "  ✅ $NAME"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ $NAME 同步失败"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "📊 同步完成：成功 $SUCCESS 个，失败 $FAILED 个"
          [ "$FAILED" -gt 0 ] && exit 1 || exit 0

